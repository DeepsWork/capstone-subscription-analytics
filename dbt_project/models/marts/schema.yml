version: 2

models:
  - name: mart_trial_conversion
    description: "Trial to paid conversion tracking"
    columns:
      - name: user_id
        tests:
          - not_null
      - name: conversion_status
        tests:
          - not_null
          - accepted_values:
              values:
                - converted
                - not_converted

  - name: mart_churn_risk
    description: "User churn risk scoring"
    columns:
      - name: user_id
        tests:
          - not_null
          - unique
      - name: churn_risk_label
        tests:
          - not_null
          - accepted_values:
              values:
                - high
                - medium
                - low
      - name: churn_risk_score
        tests:
          - not_null

  - name: mart_payment_failures
    description: "Payment failure and recovery tracking"
    columns:
      - name: payment_id
        tests:
          - not_null
          - unique
      - name: recovered_within_7_days
        tests:
          - not_null

  - name: mart_retention
    description: "User retention by plan and device"
    columns:
      - name: user_id
        tests:
          - not_null
      - name: activity_month
        tests:
          - not_null

  - name: mart_weekly_metrics
    description: "Weekly active users and engagement metrics"
    columns:
      - name: week_start
        tests:
          - not_null
          - unique
      - name: weekly_active_users
        tests:
          - not_null