name: Pipeline Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: uv sync --frozen

      # ✅ RUN FROM ROOT (FIXED)
      - name: Run pipeline
        run: uv run python pipeline_runner.py

      - name: Run pytest
        run: uv run pytest tests/ -v

      # ✅ ONLY dbt runs inside dbt_project
      - name: Run dbt tests
        working-directory: dbt_project
        env:
          DBT_PROFILES_DIR: .
        run: |
          uv run dbt deps
          uv run dbt debug
          uv run dbt test