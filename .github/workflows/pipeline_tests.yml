name: Pipeline Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Run pipeline (Bronze + Silver + Gold)
        run: uv run python pipeline_runner.py

      - name: Run pytest
        run: uv run pytest tests/ -v

      - name: Run dbt tests
        run: |
          cd dbt_project
          uv run dbt test --profiles-dir .
